<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Donuts Shop - Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.dataTables.css" />

</head>
<body>

<div th:insert="fragments/navbar :: navbar"></div>

<main class="container mt-4">
    <h1 class="mb-4">Gerenciar Produtos</h1>

    <a th:href="@{/produtos/cadastro}" class="btn btn-primary" >
        <i class="bi bi-plus-circle me-1"></i> Cadastrar novo produto
    </a>

    <div class="table-responsive">
        <table id="tabela" class="table table-striped table-hover align-middle border border-black">
            <thead >
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Nome</th>
                <th scope="col">Preço de Venda</th>
                <th scope="col">Valor de custo</th>
                <th scope="col">Observação</th>
                <th scope="col" class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${produtos}">
                <td th:text="${p.id}" scope="row"></td>
                <td th:text="${p.nome}" class="cell"></td>
                <td th:text="${p.precoVenda}" class="cell"></td>
                <td th:text="${p.precoCusto}" class="cell"></td>
                <td th:text="${p.observacao}" class="cell"></td>
                <td class="text-center">
                    <a class="btn btn-warning btn-sm me-1"

                       th:href="@{/produtos/editar(id=${p.id})}"><i class="bi bi-pencil-fill"></i></a>
                    <button data-bs-toggle="modal" th:attr="data-bs-target='#staticBackdrop'+${p.id}"
                            class="btn btn-danger btn-sm"><i class="bi bi-trash-fill"></i></button>

                    <div class="modal fade"
                         th:attr="id='staticBackdrop'+ ${p.id}"
                         data-bs-backdrop="static" data-bs-keyboard="false"
                         tabindex="-1" aria-labelledby="staticBackdropLabel"
                         aria-hidden="true">
                        <div class="modal-dialog" id="${p.id}">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="staticBackdropLabel">Excluir
                                        produto</h5>
                                </div>
                                <div class="modal-body">Deseja realmente excluir o
                                    produto selecionado?
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                            data-bs-dismiss="modal">Fechar
                                    </button>

                                        <a class="btn btn-danger" style="color: #fff; text-decoration: none;"
                                           th:href="@{/produtos/deletar(id=${p.id})}">Excluir</a>

                                </div>
                            </div>
                        </div>
                    </div>

                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/script.js"></script>
<script src="https://cdn.datatables.net/2.3.4/js/dataTables.js"></script>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.15/jquery.mask.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${produto.id != null}">
    document.addEventListener('DOMContentLoaded', function() {
        var myModal = new bootstrap.Modal(document.getElementById('staticBackdrop'));
        myModal.show();
    });
</script>

<script>
    var table = new DataTable('#tabela', {
    language: {
        url: '//cdn.datatables.net/plug-ins/2.3.4/i18n/pt-PT.json',
    },
});

</script>
</body>
</html>
